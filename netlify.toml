# Netlify build configuration.
#
# Deploy note: a prior preview deploy hit a transient upload-stage error
# (HTTP 422 "no records matched" during onPostBuild → tryUpload) — a deploy
# file-digest/manifest mismatch on the incremental upload, unrelated to the app
# code or the database migrations (which applied cleanly). Touching this config
# forces a clean full deploy, so the file set is re-uploaded from scratch rather
# than reconciled against a stale prior-deploy manifest.
#
# Secret scanning: the Firebase Web API key shipped in index.html is a PUBLIC
# client identifier (access to Firebase is controlled by Security Rules, not by
# keeping this value secret — Google documents it as safe to include in client
# code). Netlify's smart secret detection would otherwise flag the "AIza…" string
# as a likely secret and fail the build, so we safelist that one value here.
# All other secret-scanning protections remain active.
[build.environment]
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyDNkLuB8wmLuz38dfL8ZP6rvnv-efZvnyU"

# Issue Spotlight deep-links. The whole app is a single index.html, so a clean,
# shareable path like /issue/box-elder-stratos-data-center must serve that same
# document (HTTP 200 rewrite, not a redirect) and let the client-side router read
# the slug from location.pathname. Scoped to /issue/* only, so every other asset
# (/, /css/*, /netlify/*, the Functions) keeps its normal routing.
[[redirects]]
  from = "/issue/*"
  to = "/index.html"
  status = 200

# Shareable roll-call deep-links. A clean path like
# /vote/119/house/190 must serve the same single-page document (HTTP 200 rewrite)
# so the client-side router can read the congress/chamber/roll from the path and
# open the corresponding measure. Scoped to /vote/* only, leaving every other
# route (assets, /api/*, the Functions) untouched.
[[redirects]]
  from = "/vote/*"
  to = "/index.html"
  status = 200

# PWA service worker must never be served stale, or clients get stuck on an
# old worker and miss shell updates. Force revalidation on every request.
# (The worker versions and prunes its own caches internally.)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# The web app manifest changes rarely; a short cache keeps it reasonably fresh.
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
